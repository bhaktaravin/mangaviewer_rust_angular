<div class="reader-modal-overlay" *ngIf="show" (click)="close()">
  <div class="reader-modal-content" (click)="$event.stopPropagation()">
    <div class="reader-header">
      <span class="reader-title">{{ chapter?.attributes?.title || 'Chapter ' + chapter?.attributes?.chapter }}</span>
      <div class="reader-controls">
        <button (click)="setMode('vertical')" [class.active]="mode() === 'vertical'" title="Vertical (1)">↕</button>
        <button (click)="setMode('horizontal')" [class.active]="mode() === 'horizontal'" title="Horizontal (2)">↔</button>
        <button (click)="setMode('single')" [class.active]="mode() === 'single'" title="Single page (3)">□</button>
        <button (click)="setMode('double')" [class.active]="mode() === 'double'" title="Double page (4)">▭</button>
        <button (click)="showShortcuts.set(!showShortcuts())" title="Keyboard shortcuts (?)">⌨</button>
      </div>
      <button class="close-btn" (click)="close()" title="Close (Esc)">×</button>
    </div>

    <!-- Keyboard shortcuts overlay -->
    <div class="shortcuts-overlay" *ngIf="showShortcuts()" (click)="showShortcuts.set(false)">
      <div class="shortcuts-panel" (click)="$event.stopPropagation()">
        <h3>Keyboard Shortcuts</h3>
        <div class="shortcut-list">
          <div class="shortcut-row"><kbd>→</kbd> / <kbd>↓</kbd><span>Next page</span></div>
          <div class="shortcut-row"><kbd>←</kbd> / <kbd>↑</kbd><span>Previous page</span></div>
          <div class="shortcut-row"><kbd>Esc</kbd><span>Close reader</span></div>
          <div class="shortcut-row"><kbd>1</kbd><span>Vertical scroll</span></div>
          <div class="shortcut-row"><kbd>2</kbd><span>Horizontal scroll</span></div>
          <div class="shortcut-row"><kbd>3</kbd><span>Single page</span></div>
          <div class="shortcut-row"><kbd>4</kbd><span>Double page</span></div>
          <div class="shortcut-row"><kbd>?</kbd><span>Toggle this panel</span></div>
        </div>
        <button class="shortcuts-close" (click)="showShortcuts.set(false)">Got it</button>
      </div>
    </div>

    <!-- Loading state -->
    <div class="reader-loading" *ngIf="loading">
      <div class="reader-spinner"></div>
      <p>Loading pages...</p>
    </div>

    <!-- Paged modes (single / double) -->
    <ng-container *ngIf="!loading && (mode() === 'single' || mode() === 'double')">
      <div class="paged-view">
        <button class="nav-btn nav-prev" (click)="prevPage()" [disabled]="!hasPrev">‹</button>
        <div class="page-display" [class.double]="mode() === 'double'">
          <img *ngIf="images[currentPage()]" [src]="images[currentPage()]" class="reader-image" [alt]="'Page ' + (currentPage() + 1)" loading="lazy" />
          <img *ngIf="mode() === 'double' && images[currentPage() + 1]" [src]="images[currentPage() + 1]" class="reader-image" [alt]="'Page ' + (currentPage() + 2)" loading="lazy" />
        </div>
        <button class="nav-btn nav-next" (click)="nextPage()" [disabled]="!hasNext">›</button>
      </div>
      <div class="page-counter">{{ currentPage() + 1 }} / {{ images.length }}</div>
    </ng-container>

    <!-- Scroll modes (vertical / horizontal) -->
    <div class="reader-pages" [ngClass]="mode()" *ngIf="!loading && (mode() === 'vertical' || mode() === 'horizontal')">
      <ng-container *ngIf="mode() === 'vertical'">
        <img *ngFor="let img of images; let i = index" [src]="img" class="reader-image" [alt]="'Page ' + (i + 1)" loading="lazy" />
      </ng-container>
      <div class="horizontal-scroll" *ngIf="mode() === 'horizontal'">
        <img *ngFor="let img of images; let i = index" [src]="img" class="reader-image" [alt]="'Page ' + (i + 1)" loading="lazy" />
      </div>
    </div>
  </div>
</div>
